name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 12
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ledgerflow
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 12
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 12
      # SMTP sink so the template's password-recovery email test can actually send
      mailcatcher:
        image: schickling/mailcatcher
        ports: ["1025:1025"]
    env:
      PROJECT_NAME: LedgerFlow
      ENVIRONMENT: local
      SECRET_KEY: ci-not-a-real-secret
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: ci-password
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ledgerflow
      REDIS_URL: redis://localhost:6379/0
      # email config — makes settings.emails_enabled true; sends to the mailcatcher sink
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      SMTP_SSL: "false"
      EMAILS_FROM_EMAIL: info@example.com
    steps:
      - uses: actions/checkout@v7
      - name: Install uv (manages Python 3.14 automatically)
        uses: astral-sh/setup-uv@v7
      - name: Run migrations
        working-directory: backend
        run: uv run alembic upgrade head
      - name: Run tests
        working-directory: backend
        run: uv run pytest tests/ -q

  frontend:
    name: Frontend build & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Build (vite + tsc typecheck)
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: bun run build
